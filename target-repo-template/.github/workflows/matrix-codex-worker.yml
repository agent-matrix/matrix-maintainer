name: matrix-codex-worker

on:
  workflow_dispatch:
    inputs:
      operation:
        required: true
        type: string
      controller_run_id:
        required: false
        type: string
      base_branch:
        required: false
        default: main
        type: string
      fix_mode:
        required: false
        default: safe
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  codex-maintain:
    runs-on: ubuntu-latest
    env:
      STATUS_API_URL: ${{ secrets.STATUS_API_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}

      - name: Notify start
        if: env.STATUS_API_URL != ''
        run: |
          curl -sS -X POST "${STATUS_API_URL}/event" \
            -H "Content-Type: application/json" \
            -d '{"repo":"${{ github.repository }}","status":"running","operation":"${{ inputs.operation }}","run_id":"${{ github.run_id }}","stage":"started"}'

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create branch
        run: |
          BRANCH="matrix-codex/${{ inputs.operation }}-${{ github.run_id }}"
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"
          git checkout -b "$BRANCH"

      - name: Codex operation
        uses: openai/codex-action@v1
        with:
          api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt: >-
            Repository: ${{ github.repository }}.
            Operation: ${{ inputs.operation }}.
            Fix mode: ${{ inputs.fix_mode }}.
            Make minimal safe changes, then run repository validation.

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation runtime
        run: python -m pip install pyyaml

      - name: Install profiles
        run: |
          mkdir -p .github/matrix-codex
          cat > .github/matrix-codex/profiles.yml <<'EOF'
          profiles:
            python-service:
              install:
                - python -m pip install --upgrade pip
                - if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
                - if [ -f pyproject.toml ]; then pip install -e .; fi
              validate:
                - if [ -f pyproject.toml ]; then python -m pytest -q; fi
            node-web:
              install:
                - npm ci
              validate:
                - npm run lint --if-present
                - npm test --if-present
                - npm run build --if-present
            infra:
              install: []
              validate:
                - echo "No default infra validation configured"
          EOF

      - name: Validate via profile runner
        run: python -m matrix_codex.execution.worker_runner

      - name: Commit and push if changed
        run: |
          git add .
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: matrix-codex ${{ inputs.operation }}"
          git push origin "$BRANCH"

      - name: Create PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ${{ env.BRANCH }}
          base: ${{ inputs.base_branch }}
          title: "chore: matrix-codex ${{ inputs.operation }}"
          body: |
            Automated maintenance from matrix-codex.
            Controller run: ${{ inputs.controller_run_id }}

      - name: Notify success
        if: success() && env.STATUS_API_URL != ''
        run: |
          curl -sS -X POST "${STATUS_API_URL}/event" \
            -H "Content-Type: application/json" \
            -d '{"repo":"${{ github.repository }}","status":"success","operation":"${{ inputs.operation }}","run_id":"${{ github.run_id }}","stage":"completed"}'

      - name: Notify failure
        if: failure() && env.STATUS_API_URL != ''
        run: |
          curl -sS -X POST "${STATUS_API_URL}/event" \
            -H "Content-Type: application/json" \
            -d '{"repo":"${{ github.repository }}","status":"failed","operation":"${{ inputs.operation }}","run_id":"${{ github.run_id }}","stage":"failed"}'
