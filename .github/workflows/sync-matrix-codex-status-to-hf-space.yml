name: Sync Matrix Codex Status to Hugging Face Space

on:
  push:
    branches: ["main", "master"]
    paths:
      - "apps/**"
      - "Dockerfile"
      - "deploy/huggingface/**"
  workflow_dispatch: {}

jobs:
  sync-to-hub:
    name: Deploy to HF Spaces
    runs-on: ubuntu-latest
    concurrency:
      group: hf-space-sync-matrix-codex-status
      cancel-in-progress: false
    env:
      HF_USERNAME: ${{ secrets.HF_USERNAME }}
      SPACE_NAME: ${{ secrets.SPACE_NAME }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          if [ -z "$HF_USERNAME" ] || [ -z "$SPACE_NAME" ] || [ -z "$HF_TOKEN" ]; then
            echo "Missing required secrets."
            echo "Required: HF_TOKEN, HF_USERNAME, SPACE_NAME"
            exit 1
          fi

      - name: Build deploy tree
        run: |
          set -e
          DEPLOY_DIR=$(mktemp -d)
          echo "DEPLOY_DIR=$DEPLOY_DIR" >> "$GITHUB_ENV"

          mkdir -p "$DEPLOY_DIR/apps/backend" "$DEPLOY_DIR/apps/frontend" "$DEPLOY_DIR/deploy/huggingface"
          cp -r apps/backend/* "$DEPLOY_DIR/apps/backend/"
          cp -r apps/frontend/* "$DEPLOY_DIR/apps/frontend/"
          cp Dockerfile "$DEPLOY_DIR/"
          cp deploy/huggingface/README.md "$DEPLOY_DIR/README.md"

          rm -rf "$DEPLOY_DIR/apps/frontend/node_modules" "$DEPLOY_DIR/apps/frontend/.next"

          test -f "$DEPLOY_DIR/Dockerfile"
          test -f "$DEPLOY_DIR/README.md"
          test -f "$DEPLOY_DIR/apps/frontend/package.json"
          test -f "$DEPLOY_DIR/apps/frontend/next.config.js"
          test -f "$DEPLOY_DIR/apps/backend/main.py"

      - name: Push deploy tree to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -e
          cd "$DEPLOY_DIR"

          REMOTE_URL="https://${HF_USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_USERNAME}/${SPACE_NAME}"

          git init -b main
          git lfs install --skip-smudge 2>/dev/null || true
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Deploy Matrix Codex Status from ${GITHUB_SHA::8}"

          MAX_RETRIES=4
          DELAY=2
          for i in $(seq 1 $MAX_RETRIES); do
            if git push --force "$REMOTE_URL" main; then
              echo "Deployment successful: https://huggingface.co/spaces/${HF_USERNAME}/${SPACE_NAME}"
              exit 0
            fi
            echo "Push attempt ${i}/${MAX_RETRIES} failed, retrying in ${DELAY}s..."
            sleep "$DELAY"
            DELAY=$((DELAY * 2))
          done

          echo "Failed to push after ${MAX_RETRIES} attempts."
          exit 1
