organization: agent-matrix
default_branch: main

repositories:
  - name: matrix-hub
    stack: python
    profile: python-service
    branch: main
    tasks: [repair_tests, repair_lint, update_dependencies]
    risk: medium
  - name: matrix-guardian
    stack: python
    profile: python-service
    branch: main
    tasks: [repair_tests, update_dependencies]
    risk: high
  - name: matrix-ai
    stack: python
    profile: python-service
    branch: main
    tasks: [repair_tests, repair_lint, update_dependencies]
    risk: medium
  - name: matrix-architect
    stack: python
    profile: python-service
    branch: main
    tasks: [repair_tests, repair_lint]
    risk: medium
  - name: matrix-system
    stack: python
    profile: python-service
    branch: main
    tasks: [repair_tests, update_dependencies]
    risk: medium
  - name: matrix-hub-admin
    stack: node
    profile: node-web
    branch: main
    tasks: [repair_lint, update_dependencies]
    risk: medium
  - name: matrix-treasury
    stack: python
    profile: python-service
    branch: main
    tasks: [repair_tests, update_dependencies]
    risk: high

profiles:
  python-service:
    run_tests: true
    run_lint: true
    open_pr: true
    install: "python -m pip install -r requirements.txt"
    test: "pytest"
    lint: "ruff check ."
  node-web:
    run_tests: true
    run_lint: true
    open_pr: true
    install: "npm ci"
    test: "npm test -- --runInBand"
    lint: "npm run lint"
  infra:
    run_tests: false
    run_lint: false
    open_pr: true
    install: "echo infra profile"
    test: "echo skip tests"
    lint: "echo skip lint"
